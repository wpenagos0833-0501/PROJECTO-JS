<!DOCTYPE HTML>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Proyecto con JavaScript</title>

    <!-- Estilos CSS -->
    <link rel="stylesheet" type="text/css" href="css/styles.css" />
    <link id="theme" rel="stylesheet" type="text/css" href="css/green.css" />

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
    <link rel="stylesheet" href="js/jquery-ui/jquery-ui.min.css" />
    <link rel="stylesheet" href="js/jquery-ui/jquery-ui.structure.min.css" />
    <link rel="stylesheet" href="js/jquery-ui/jquery-ui.theme.min.css" />
    <script type="text/javascript" src="js/jquery-ui/jquery-ui.min.js"></script>

    <!-- Plugin validacion -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-form-validator/2.3.26/jquery.form-validator.min.js"></script>

    <!-- Mis Scripts -->
    <script type="text/javascript" src="js/main.js"></script>
</head>
<body>
<div id="selector-theme">
    <div id="to-green"></div>
    <div id="to-red"></div>
    <div id="to-blue"></div>
</div>

<section id="global">

    <!-- Cabecera -->
    <header>
        <div id="logo">
            Proyecto wilson
        </div>

        <div class="clearfix"></div>

        <nav id="menu">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="reloj.html">Reloj</a></li>
                <li><a href="about.html">Sobre mi</a></li>
                <li><a href="contact.html">Contacto</a></li>
            </ul>
        </nav>
    </header>


    <!-- Contenido -->

    <section id="content">

        <div id="box">
            <h2>Contacto</h2>

            <form action="" method="POST" id="form_contact">
                <label for="name">Nombre</label>
                <input type="text" name="name" id="name" data-validation="alphanumeric" />

                <label for="surname">Apellidos</label>
                <input type="text" name="surname" id="surname" data-validation="alphanumeric" />

                <label for="email">Email</label>
                <input type="email" name="email" id="email" data-validation="email"/>

                <label for="sex">Sexo</label>
                <select name="sex" id="sex" data-validation="required">
                    <option value="men">Hombre</option>
                    <option value="woman">Mujer</option>
                </select>

                <label for="date">Fecha de nacimiento</label>
                <input type="text" name="date" id="date" data-validation="date" data-validation-format="dd-mm-yyyy"/>

                <label for="years">Edad</label>
                <input type="number" name="years" id="years" data-validation="number"/>

                <input type="submit" value="Enviar" />
            </form>
        </div> <aside id="sidebar">
        <div id="about">
            <h4><span>¿Quién soy?</span></h4>
            <img src="img/caracol.jpg" alt="caracol" />
            <p>Descripción personal para el proyecto del SENA.</p>
        </div>
        <div id="login">
            <h4><span>Identifícate</span></h4>
        </div>
    </aside>

        <div class="clearfix"></div>

    </section>

</section>

<footer>
    Master de JavaScript de Víctor Robles &copy;

    <a href="#" class="subir">Ir arriba</a>
</footer>
</body>
</html>
